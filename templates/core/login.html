{% extends 'core/base.html' %}

{% block title %}Login - JeevanSetu AI{% endblock %}

{% block content %}
<div class="form-container animate-fade-in">
    <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Username</label>
            <input type="text" name="username" id="id_username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
            <label for="id_password">Password</label>
            <input type="password" name="password" id="id_password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
    </form>
    <p style="text-align: center; margin-top: 1.5rem; color: var(--muted);">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); font-weight: 600;">Sign Up</a>
    </p>
</div>
{% endblock %}
