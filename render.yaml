services:
  - type: web
    name: jeevansetu-ai
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py migrate"
    startCommand: "gunicorn jeevansetu.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jeevansetu-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.2
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: jeevansetu-db
    plan: free
